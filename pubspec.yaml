name: ieee_event_keeper
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.5.5
  flutter_riverpod: ^2.5.1
  syncfusion_flutter_calendar: ^26.1.1
  qr_flutter: ^4.1.0
  pdf: ^3.10.8
  printing: ^5.12.0
  csv: ^6.0.0
  url_launcher: ^6.3.0
  intl: ^0.19.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.1
  googleapis_auth: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/